<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Billing Software{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #0f766e;
            --primary-dark: #115e59;
            --border: #d1d5db;
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #ecfeff 100%);
            color: var(--text);
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 860px;
            background: var(--card);
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(15, 118, 110, 0.12);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .card-panel {
            padding: 36px;
        }

        .card-panel.hero {
            background: linear-gradient(160deg, #0f766e 0%, #164e63 100%);
            color: #fff;
        }

        h1, h2 {
            margin-top: 0;
        }

        p {
            color: inherit;
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        button, .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
        }

        button:hover, .button-link:hover {
            background: var(--primary-dark);
        }

        .muted {
            color: var(--muted);
        }

        .errorlist,
        .messages {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .errorlist li {
            color: var(--danger);
            font-size: 14px;
            margin-top: 6px;
        }

        .messages li {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            background: #dcfce7;
            color: #166534;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .dashboard-card {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
        }

        .dashboard-card p {
            margin: 8px 0;
            color: var(--text);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background: #f8fafc;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #475569;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .button-secondary {
            background: #e2e8f0;
            color: #0f172a;
        }

        .button-secondary:hover {
            background: #cbd5e1;
        }

        .button-danger {
            background: #dc2626;
        }

        .button-danger:hover {
            background: #b91c1c;
        }

        .inline-form {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .inline-form input {
            max-width: 320px;
        }

        .empty-state {
            padding: 30px;
            text-align: center;
            background: #fff;
            border: 1px dashed #cbd5e1;
            border-radius: 14px;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            .card {
                grid-template-columns: 1fr;
            }

            .inline-form {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if messages %}
        <div style="max-width: 860px; margin: 24px auto 0; padding: 0 24px;">
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
